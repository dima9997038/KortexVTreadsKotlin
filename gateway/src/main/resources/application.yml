# gateway/application.yaml
spring:
  application:
    name: gateway
  config:
    import: optional:configserver:http://config-server:8888

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: backend-route
              uri: lb://kortex
              predicates:
                - Path=/api/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/
  instance:
    prefer-ip-address: true